target_api:
  base_url: "http://192.168.1.181:8080"
  api_key: ""
  timeout: 300
  max_retries: 2

judge:
  provider: anthropic
  model: claude-sonnet-4-6
  auth_type: oauth  # "api_key" uses ANTHROPIC_API_KEY, "oauth" uses ANTHROPIC_AUTH_TOKEN (Claude Code subscription)

scoring:
  tool_weight: 0.4
  knowledge_weight: 0.3
  context_weight: 0.3

run:
  tiers: [1, 2, 3]
  categories: [tool_calling, knowledge, context]
  domains: []
  max_context_tokens: 0  # Skip context tests above this size (0 = no limit)
