name: tcp_handshake
tier: 1
category: knowledge
domain: networking

prompt: "Explain the TCP three-way handshake process. What happens at each step, what flags are set, and why is this process necessary for reliable communication?"

judge_criteria:
  - "Must describe the SYN step: client sends a segment with the SYN flag set and an initial sequence number (ISN)"
  - "Must describe the SYN-ACK step: server responds with both SYN and ACK flags set, its own ISN, and acknowledges the client's ISN+1"
  - "Must describe the ACK step: client sends an ACK acknowledging the server's ISN+1, completing the connection"
  - "Must explain the purpose: establishing a reliable, full-duplex connection and synchronizing sequence numbers between both sides"
