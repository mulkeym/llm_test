name: cron_syntax
tier: 1
category: knowledge
domain: scripting

prompt: "Explain the cron scheduling syntax in Linux. What do each of the five fields represent? Write a cron entry that runs a backup script at 2:30 AM every Sunday, and another that runs every 15 minutes during business hours (9 AM to 5 PM) on weekdays."

judge_criteria:
  - "Must explain the five fields in order: minute (0-59), hour (0-23), day of month (1-31), month (1-12), day of week (0-7, where 0 and 7 are Sunday)"
  - "Must provide correct cron entry for Sunday 2:30 AM: 30 2 * * 0 /path/to/backup.sh (or using 7 for Sunday)"
  - "Must provide correct cron entry for every 15 minutes during business hours on weekdays: */15 9-17 * * 1-5 /path/to/script.sh (or equivalent)"
  - "Must mention special characters: * (any), */n (every n), - (range), , (list)"
