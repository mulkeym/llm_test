name: secrets_management
tier: 2
category: knowledge
domain: security

prompt: "Compare approaches for managing secrets (API keys, database passwords, certificates) in applications. Cover environment variables, secrets management tools, and cloud-native solutions. What are the risks of each approach and best practices?"

judge_criteria:
  - "Must discuss environment variables as a basic approach: simple but visible in process listings, logs, and error reports; better than hardcoding but not sufficient for production security"
  - "Must describe dedicated secrets management tools like HashiCorp Vault, AWS Secrets Manager, Azure Key Vault, or GCP Secret Manager with features like dynamic secrets, automatic rotation, audit logging, and access control"
  - "Must explain the risks of common anti-patterns: secrets committed to version control, hardcoded in source code, stored in plaintext config files, or shared via insecure channels"
  - "Must cover best practices: secret rotation policies, least-privilege access to secrets, encryption of secrets at rest and in transit, audit trails for secret access, and using tools like git-secrets or pre-commit hooks to prevent accidental commits"
