name: security_incident
tier: 2
category: tool_calling
description: Security incident response — check logs, look up user, create ticket, notify security team

prompt: "We detected multiple failed SSH login attempts from user rjones on jump-01. Check the auth logs, look up who rjones is, file a security incident ticket, and notify the security team on Slack."

available_tools:
  - check_logs
  - lookup_user
  - create_ticket
  - send_notification
  - check_service_status
  - get_metrics
  - run_script

expected_tool_calls:
  - tool: check_logs
    params:
      service: sshd
      severity: warning
      host: jump-01
  - tool: lookup_user
    params:
      username: rjones
  - tool: create_ticket
    params:
      title: "Security incident — multiple failed SSH logins from rjones on jump-01"
      description: "Multiple failed SSH login attempts detected from user rjones on jump-01. User account belongs to Robert Jones (terminated employee). Possible unauthorized access attempt."
      priority: critical
  - tool: send_notification
    params:
      channel: slack
      recipient: "#security-team"
      message: "SECURITY ALERT: Multiple failed SSH login attempts from user rjones on jump-01. Incident ticket created. Immediate investigation required."
      urgency: critical

