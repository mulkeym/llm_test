name: investigate_slow_db
tier: 2
category: tool_calling
description: Investigate slow database performance — get metrics, check logs, create ticket if issues found

prompt: "The app team says queries are taking forever on db-prod-01. Get the performance metrics, check the PostgreSQL logs for errors, and if something looks wrong create a ticket so the DBA team can investigate."

available_tools:
  - get_metrics
  - check_logs
  - create_ticket
  - check_service_status
  - query_database
  - restart_service
  - send_notification

expected_tool_calls:
  - tool: get_metrics
    params:
      host: db-prod-01
      metric_type: all
  - tool: check_logs
    params:
      service: postgresql
      severity: error
      host: db-prod-01
  - tool: create_ticket
    params:
      title: "Slow query performance on db-prod-01"
      description: "Database queries are running slowly. Metrics show high CPU and memory usage. Logs indicate long-running queries and lock contention."
      priority: high

simulated_responses:
  get_metrics:
    host: db-prod-01
    metric_type: all
    data:
      cpu_percent: 94.5
      memory_percent: 87.2
      disk_io_read_mbps: 320
      disk_io_write_mbps: 45
      active_connections: 248
      max_connections: 300
  check_logs:
    entries:
      - timestamp: "2026-03-30T14:00:12Z"
        level: warning
        message: "LOG: duration: 45231.442 ms statement: SELECT * FROM orders JOIN order_items..."
      - timestamp: "2026-03-30T14:02:30Z"
        level: error
        message: "ERROR: deadlock detected"
      - timestamp: "2026-03-30T14:05:00Z"
        level: warning
        message: "LOG: checkpoints are occurring too frequently (28 seconds apart)"
    total_count: 82
  create_ticket:
    ticket_id: "INC-20260330-0043"
    status: created
    priority: high
    created_at: "2026-03-30T14:30:00Z"

scoring:
  correct_tool: 5
  correct_params: 3
  correct_ordering: 3
  no_hallucinated_tools: 2
