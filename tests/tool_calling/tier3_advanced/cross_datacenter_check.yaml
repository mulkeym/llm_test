name: cross_datacenter_check
tier: 3
category: tool_calling
description: Parallel network checks across 3 hosts in different datacenters — ping, traceroute, check port for each

prompt: "We need to verify connectivity to our load balancers in all three datacenters: lb-us-east-01, lb-us-west-01, and lb-eu-01. For each one, ping it, run a traceroute, and check if port 443 is open. Run the checks in parallel where possible."

available_tools:
  - ping_host
  - traceroute
  - check_port
  - check_service_status
  - dns_lookup
  - get_metrics
  - check_logs
  - restart_service
  - run_script
  - create_ticket
  - send_notification
  - lookup_user
  - query_database
  - update_firewall_rule
  - whois_lookup
  - subnet_calculator
  - manage_dns_record
  - get_arp_table

expected_tool_calls:
  - tool: ping_host
    params:
      host: lb-us-east-01
  - tool: ping_host
    params:
      host: lb-us-west-01
  - tool: ping_host
    params:
      host: lb-eu-01
  - tool: traceroute
    params:
      host: lb-us-east-01
  - tool: traceroute
    params:
      host: lb-us-west-01
  - tool: traceroute
    params:
      host: lb-eu-01
  - tool: check_port
    params:
      host: lb-us-east-01
      port: 443
  - tool: check_port
    params:
      host: lb-us-west-01
      port: 443
  - tool: check_port
    params:
      host: lb-eu-01
      port: 443

