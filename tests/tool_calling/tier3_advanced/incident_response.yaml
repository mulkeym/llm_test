name: incident_response
tier: 3
category: tool_calling
description: Full incident response — logs, metrics, user lookup, ARP check, ticket, notification, remediation script

prompt: "We suspect an insider threat on the internal network. Check the auth logs on jump-01 for suspicious activity, pull system metrics, look up user bwilson who triggered the alert, check the ARP table on switch-core-01 for their workstation MAC, create a critical security ticket, send an alert to #security-ops on Slack, and run the forensic snapshot script /opt/scripts/forensic_capture.sh on jump-01."

available_tools:
  - check_logs
  - get_metrics
  - lookup_user
  - get_arp_table
  - create_ticket
  - send_notification
  - run_script
  - ping_host
  - dns_lookup
  - traceroute
  - check_port
  - check_service_status
  - restart_service
  - query_database
  - update_firewall_rule
  - whois_lookup
  - subnet_calculator
  - manage_dns_record

expected_tool_calls:
  - tool: check_logs
    params:
      service: sshd
      severity: warning
      host: jump-01
  - tool: get_metrics
    params:
      host: jump-01
      metric_type: all
  - tool: lookup_user
    params:
      username: bwilson
  - tool: get_arp_table
    params:
      host: switch-core-01
  - tool: create_ticket
    params:
      title: "Security alert — suspected insider threat involving bwilson"
      description: "Insider threat investigation triggered by suspicious activity from user bwilson on jump-01. Auth logs show unauthorized access patterns. Forensic capture initiated."
      priority: critical
  - tool: send_notification
    params:
      channel: slack
      recipient: "#security-ops"
      message: "SECURITY ALERT: Suspected insider threat — user bwilson flagged for suspicious activity on jump-01. Forensic capture in progress. Critical ticket created."
      urgency: critical
  - tool: run_script
    params:
      command: "/opt/scripts/forensic_capture.sh"
      host: jump-01
      sudo: true

simulated_responses:
  check_logs:
    entries:
      - timestamp: "2026-03-30T13:30:00Z"
