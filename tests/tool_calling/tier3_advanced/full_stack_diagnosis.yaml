name: full_stack_diagnosis
tier: 3
category: tool_calling
description: Full stack diagnosis — service status, database health, multi-metric collection, logs, subnet info, summary ticket

prompt: "The entire e-commerce stack on app-prod-01 seems slow. Do a full stack diagnosis: check the application service status, query the ecommerce database for active connection count, get CPU metrics, get memory metrics, get disk metrics, check the application logs for errors, calculate the subnet info for the app tier at 10.0.10.0/22 so we know the host range, and create a summary ticket with all findings."

available_tools:
  - check_service_status
  - query_database
  - get_metrics
  - check_logs
  - subnet_calculator
  - create_ticket
  - ping_host
  - dns_lookup
  - traceroute
  - check_port
  - restart_service
  - run_script
  - send_notification
  - lookup_user
  - update_firewall_rule
  - whois_lookup
  - manage_dns_record
  - get_arp_table

expected_tool_calls:
  - tool: check_service_status
    params:
      service_name: ecommerce-app
      host: app-prod-01
  - tool: query_database
    params:
      query: "SELECT count(*) as active_connections FROM pg_stat_activity WHERE state = 'active'"
      database: ecommerce
  - tool: get_metrics
    params:
      host: app-prod-01
      metric_type: cpu
  - tool: get_metrics
    params:
      host: app-prod-01
      metric_type: memory
  - tool: get_metrics
    params:
      host: app-prod-01
      metric_type: disk
  - tool: check_logs
    params:
      service: ecommerce-app
      severity: error
      host: app-prod-01
  - tool: subnet_calculator
    params:
      cidr: "10.0.10.0/22"
  - tool: create_ticket
    params:
      title: "Full stack diagnosis — app-prod-01 performance degradation"
      description: "Full stack diagnosis completed for app-prod-01. Application service running but degraded. High CPU (92%), high memory (88%), disk at 75%. Database has 180 active connections. Application logs show connection pool exhaustion. App tier subnet 10.0.10.0/22 covers 1022 hosts."
      priority: high

simulated_responses:
  check_service_status:
    service_name: ecommerce-app
    host: app-prod-01
    status: running
    uptime: "15d 3h 22m"
    pid: 9821
    memory_mb: 6144
    cpu_percent: 92.1
  query_database:
    rows:
      - active_connections: 180
    row_count: 1
    query_time_ms: 2450
  get_metrics_cpu:
    host: app-prod-01
    metric_type: cpu
    data:
      usage_percent: 92.1
      user_percent: 78.5
      system_percent: 13.6
      iowait_percent: 0.0
      load_avg_1m: 14.5
      load_avg_5m: 12.8
      cores: 8
  get_metrics_memory:
    host: app-prod-01
    metric_type: memory
    data:
      total_gb: 32
      used_gb: 28.2
      free_gb: 3.8
      cached_gb: 4.5
      usage_percent: 88.1
      swap_used_gb: 2.1
  get_metrics_disk:
    host: app-prod-01
    metric_type: disk
    data:
      - mount: "/"
        total_gb: 200
        used_gb: 150
        free_gb: 50
        usage_percent: 75.0
  check_logs:
    entries:
      - timestamp: "2026-03-30T15:00:00Z"
        level: error
        message: "Connection pool exhausted: 200/200 connections in use, 45 requests waiting"
      - timestamp: "2026-03-30T15:01:00Z"
        level: error
        message: "Request timeout after 30000ms: GET /api/products"
      - timestamp: "2026-03-30T15:02:00Z"
        level: warning
        message: "GC pause exceeded threshold: 1250ms"
    total_count: 320
  subnet_calculator:
    cidr: "10.0.10.0/22"
    network_address: "10.0.8.0"
    broadcast_address: "10.0.11.255"
    subnet_mask: "255.255.252.0"
    first_usable: "10.0.8.1"
    last_usable: "10.0.11.254"
    total_hosts: 1022
  create_ticket:
    ticket_id: "INC-20260330-0055"
    status: created
    priority: high
    created_at: "2026-03-30T16:30:00Z"

scoring:
  correct_tool: 5
  correct_params: 3
  correct_ordering: 3
  parallel_calls: 2
  no_hallucinated_tools: 2
