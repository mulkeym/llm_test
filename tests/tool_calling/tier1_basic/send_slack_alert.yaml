name: send_slack_alert
tier: 1
category: tool_calling
description: Send a critical Slack alert about disk space to the ops channel

prompt: "Send a critical alert to the #ops-alerts Slack channel. storage-01 is at 93% disk usage and needs immediate attention."

available_tools:
  - send_notification
  - create_ticket
  - get_metrics

expected_tool_calls:
