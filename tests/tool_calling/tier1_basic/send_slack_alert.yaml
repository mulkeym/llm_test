    status: sent
    channel: slack
    recipient: "#ops-alerts"
    timestamp: "2026-03-30T14:40:00Z"
    message_id: "msg-20260330-1440"

scoring:
  correct_tool: 5
  correct_params: 3
  no_hallucinated_tools: 2
