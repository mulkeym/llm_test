name: restart_apache
tier: 1
category: tool_calling
description: Restart the Apache web server on a production host

prompt: "Apache is throwing 503 errors on web-prod-01. Can you restart the apache2 service on that box?"

available_tools:
  - restart_service
  - check_service_status
  - check_logs

expected_tool_calls:
