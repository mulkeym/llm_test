name: traceroute
description: Trace the network path to a destination showing each hop
parameters:
  type: object
  properties:
    host:
      type: string
      description: Target hostname or IP address
    max_hops:
      type: integer
      description: Maximum number of hops to trace
      default: 30
    protocol:
      type: string
      enum: [icmp, udp, tcp]
      description: Protocol to use for traceroute
      default: icmp
  required: [host]
