name: check_port
description: Check if a specific port is open and listening on a host
parameters:
  type: object
  properties:
    host:
      type: string
      description: Target hostname or IP address
    port:
      type: integer
      description: Port number to check
    protocol:
      type: string
      enum: [tcp, udp]
      description: Protocol to check
      default: tcp
    timeout:
      type: integer
      description: Connection timeout in seconds
      default: 5
  required: [host, port]
